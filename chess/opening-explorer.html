
<!DOCTYPE html>
<html>
<body>

<h2>Opening Explorer</h2>

<input id="move">

<button onclick="lookup()">Search</button>

<p id="result"></p>

<script>

var openings={
"e4":"King Pawn Opening",
"d4":"Queen Pawn Opening",
"e4 e5":"Open Game",
"e4 c5":"Sicilian Defense"
}

function lookup(){

var m=document.getElementById("move").value

document.getElementById("result").innerHTML=openings[m]||"Unknown"

}

</script>

</body>
</html>
